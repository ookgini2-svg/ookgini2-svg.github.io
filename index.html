<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curtain Call Archive</title>
    <style>
        /* ==========================================
           1. 전체 레이아웃 & 기본 폰트
           ========================================== */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        /* ==========================================
           2. 완벽한 순백색 단색 커튼
           ========================================== */
        .curtain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 5;
            pointer-events: none;
        }

        .curtain-left, .curtain-right {
            width: 50%;
            height: 100%;
            background: #ffffff; 
            transition: transform 1.3s cubic-bezier(0.25, 1, 0.5, 1), opacity 1s ease-out;
        }

        body.light-on .curtain-left { transform: translateX(-100%); opacity: 0; }
        body.light-on .curtain-right { transform: translateX(100%); opacity: 0; }

        /* ==========================================
           3. [수정] 커튼 유무에 따라 색상이 반전되는 스위치
           ========================================== */
        .switch-container {
            text-align: center;
            cursor: pointer;
            z-index: 15;
            background: none;
            border: none;
            padding: 15px;
            outline: none;
            margin-bottom: 50px;
        }

        /* 기본 상태 (흰색 커튼이 닫혀 있을 때): 검은색 선으로 또렷하게 표시 */
        .switch-container svg {
            stroke: #0d0d0d;
            stroke-width: 1.8;
            fill: none;
            transition: stroke 0.5s ease, filter 0.4s ease;
        }

        /* 활성화 상태 (조명이 켜지고 흰색 커튼이 사라졌을 때): 흰색 선 + 네온 화이트 발광 */
        .switch-container.active svg {
            stroke: #ffffff;
            filter: drop-shadow(0 0 8px #ffffff) drop-shadow(0 0 20px rgba(255,255,255,0.6));
        }

        /* ==========================================
           4. 상단 카테고리 대형 아이콘 영역
           ========================================== */
        .category-zone {
            opacity: 0;
            transform: translateY(15px);
            width: 95%;
            max-width: 850px;
            text-align: center;
            transition: opacity 1s ease, transform 1s ease;
            z-index: 2;
            visibility: hidden;
        }

        body.light-on .category-zone {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }

        .category-flex {
            display: flex;
            justify-content: center;
            gap: 65px;
            flex-wrap: wrap;
            margin-bottom: 40px;
        }

        .category-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 15px;
            transition: all 0.3s ease;
            outline: none;
        }

        .category-icon-btn svg {
            stroke: #3c3c3c;
            stroke-width: 1.8;
            fill: none;
            transition: all 0.3s ease;
        }

        .category-icon-btn:hover svg, .category-icon-btn.selected svg {
            stroke: #ffffff;
            filter: drop-shadow(0 0 8px #ffffff) drop-shadow(0 0 20px #ffffff);
            transform: scale(1.15);
        }

        /* ==========================================
           5. 하단 원페이지 나무위키 문서 서식
           ========================================== */
        .character-list-section {
            display: none;
            background: #161616; 
            border: 1px solid #2c2c2c;
            padding: 35px;
            border-radius: 6px;
            text-align: left;
            margin-top: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.5);
            animation: slideFadeIn 0.5s cubic-bezier(0.25, 1, 0.5, 1) forwards;
        }

        @keyframes slideFadeIn {
            from { opacity: 0; transform: translateY(15px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .wiki-center-icon {
            display: flex;
            justify-content: center;
            align-items: center;
            margin-bottom: 35px;
            padding-bottom: 20px;
            border-bottom: 2px solid #2d2d2d;
        }

        .wiki-center-icon svg {
            stroke: #ffffff;
            stroke-width: 1.8;
            fill: none;
            filter: drop-shadow(0 0 6px #ffffff) drop-shadow(0 0 15px #ffffff); 
        }

        .wiki-table {
            width: 100%;
            max-width: 450px;
            margin: 0 auto 30px auto; 
            border-collapse: collapse;
            border: 1px solid #383838;
            font-size: 14px;
        }

        .wiki-table th {
            background: #252525;
            color: #ffffff;
            padding: 10px;
            font-weight: bold;
            border: 1px solid #383838;
            width: 30%;
            text-align: center;
        }

        .wiki-table td {
            background: #1c1c1c;
            color: #dddddd;
            padding: 10px;
            border: 1px solid #383838;
        }

        .wiki-heading {
            font-size: 20px;
            color: #ffffff;
            border-left: 4px solid #ffffff;
            padding-left: 10px;
            margin: 30px 0 15px 0;
            font-weight: bold;
        }

        .wiki-content {
            font-size: 15px;
            line-height: 1.7;
            color: #dfdfdf;
            margin-bottom: 20px;
            padding-left: 5px;
        }
    </style>
</head>
<body>

    <div class="curtain-container">
        <div class="curtain-left"></div>
        <div class="curtain-right"></div>
    </div>

    <button class="switch-container" id="lampSwitch" onclick="toggleStage()">
        <svg width="65" height="65" viewBox="0 0 80 80">
            <line x1="10" y1="10" x2="70" y2="10" />
            <line x1="40" y1="10" x2="40" y2="35" />
            <path d="M28,35 L52,35 L48,50 L32,50 Z" />
            <line x1="32" y1="50" x2="48" y2="50" />
        </svg>
    </button>

    <div class="category-zone" id="categoryZone">
        <div class="category-flex">
            
            <button class="category-icon-btn" id="btn-cat1" onclick="showCategory('cat1')">
                <svg width="55" height="55" viewBox="0 0 60 60">
                    <circle cx="30" cy="30" r="25" />
                    <path d="M13,17 C21,23 21,37 13,43" />
                    <path d="M47,17 C39,23 39,37 47,43" />
                </svg>
            </button>

            <button class="category-icon-btn" id="btn-cat2" onclick="showCategory('cat2')">
                <svg width="55" height="55" viewBox="0 0 60 60">
                    <circle cx="30" cy="30" r="13" />
                    <path d="M30,6 L30,12 M30,48 L30,54 M6,30 L12,30 M48,30 L54,30 M14,14 L18,18 M42,42 L46,46 M14,42 L18,38 M42,14 L46,18" />
                </svg>
            </button>

            <button class="category-icon-btn" id="btn-cat3" onclick="showCategory('cat3')">
                <svg width="55" height="55" viewBox="0 0 60 60">
                    <path d="M12,32 C12,16 48,16 48,32 Z" />
                    <path d="M23,32 L23,48 C23,52 37,52 37,48 L37,32" />
                    <line x1="12" y1="32" x2="48" y2="32" />
                </svg>
            </button>

            <button class="category-icon-btn" id="btn-cat4" onclick="showCategory('cat4')">
                <svg width="55" height="55" viewBox="0 0 60 60">
                    <circle cx="30" cy="30" r="25" />
                    <line x1="5" y1="30" x2="55" y2="30" />
                    <circle cx="30" cy="30" r="8" style="fill: #0d0d0d; stroke-width: 1.8;" />
                    <circle cx="30" cy="30" r="3" />
                </svg>
            </button>

        </div>

        <div class="character-list-section" id="list-cat1">
            <div class="wiki-center-icon">
                <svg width="50" height="50" viewBox="0 0 60 60"><circle cx="30" cy="30" r="25" /><path d="M13,17 C21,23 21,37 13,43" /><path d="M47,17 C39,23 39,37 47,43" /></svg>
            </div>
            
            <table class="wiki-table">
                <tr><th>이름</th><td>캐릭터 이름 입력</td></tr>
                <tr><th>소속</th><td>여기에 소속 입력</td></tr>
                <tr><th>상태</th><td>활동 가능 / 불명</td></tr>
            </table>

            <div class="wiki-heading">1. 개요</div>
            <div class="wiki-content">내용을 입력하세요.</div>
            
            <div class="wiki-heading">2. 세부 설정</div>
            <div class="wiki-content">내용을 입력하세요.</div>
        </div>

        <div class="character-list-section" id="list-cat2">
            <div class="wiki-center-icon">
                <svg width="50" height="50" viewBox="0 0 60 60"><circle cx="30" cy="30" r="13" /><path d="M30,6 L30,12 M30,48 L30,54 M6,30 L12,30 M48,30 L54,30 M14,14 L18,18 M42,42 L46,46 M14,42 L18,38 M42,14 L46,18" /></svg>
            </div>

            <table class="wiki-table">
                <tr><th>이름</th><td>캐릭터 이름 입력</td></tr>
                <tr><th>소속</th><td>여기에 소속 입력</td></tr>
            </table>

            <div class="wiki-heading">1. 개요</div>
            <div class="wiki-content">내용을 입력하세요.</div>
        </div>

        <div class="character-list-section" id="list-cat3">
            <div class="wiki-center-icon">
                <svg width="50" height="50" viewBox="0 0 60 60"><path d="M12,32 C12,16 48,16 48,32 Z" /><path d="M23,32 L23,48 C23,52 37,52 37,48 L37,32" /><line x1="12" y1="32" x2="48" y2="32" /></svg>
            </div>

            <table class="wiki-table">
                <tr><th>이름</th><td>캐릭터 이름 입력</td></tr>
                <tr><th>소속</th><td>여기에 소속 입력</td></tr>
            </table>

            <div class="wiki-heading">1. 개요</div>
            <div class="wiki-content">내용을 입력하세요.</div>
        </div>

        <div class="character-list-section" id="list-cat4">
            <div class="wiki-center-icon">
                <svg width="50" height="50" viewBox="0 0 60 60"><circle cx="30" cy="30" r="25" /><line x1="5" y1="30" x2="55" y2="30" /><circle cx="30" cy="30" r="8" style="fill: #0d0d0d; stroke-width: 1.8;" /><circle cx="30" cy="30" r="3" /></svg>
            </div>

            <table class="wiki-table">
                <tr><th>이름</th><td>캐릭터 이름 입력</td></tr>
                <tr><th>소속</th><td>여기에 소속 입력</td></tr>
            </table>

            <div class="wiki-heading">1. 개요</div>
            <div class="wiki-content">내용을 입력하세요.</div>
        </div>

    </div>

    <script>
        function toggleStage() {
            const body = document.body;
            const lampSwitch = document.getElementById('lampSwitch');
            
            if(body.classList.contains('light-on')) {
                body.classList.remove('light-on');
                lampSwitch.classList.remove('active');
                
                const allLists = document.querySelectorAll('.character-list-section');
                allLists.forEach(list => list.style.display = 'none');
                const allCards = document.querySelectorAll('.category-icon-btn');
                allCards.forEach(card => card.classList.remove('selected'));
            } else {
                body.classList.add('light-on');
                lampSwitch.classList.add('active');
            }
        }

        function showCategory(categoryId) {
            const allLists = document.querySelectorAll('.character-list-section');
            allLists.forEach(list => list.style.display = 'none');

            const allCards = document.querySelectorAll('.category-icon-btn');
            allCards.forEach(card => card.classList.remove('selected'));

            const targetList = document.getElementById('list-' + categoryId);
            if (targetList) {
                targetList.style.display = 'block';
                document.getElementById('btn-' + categoryId).classList.add('selected');
                targetList.scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
