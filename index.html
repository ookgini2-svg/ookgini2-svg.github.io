<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curtain Call Archive</title>
    <style>
        /* ==========================================
           1. 전체 레이아웃 & 테마 (딥 블랙)
           ========================================== */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d; /* 완전한 암전 상태의 블랙 */
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
        }

        /* ==========================================
           2. 실제 천 느낌의 입체 무대 커튼 (Curtain) 연출
           ========================================== */
        .curtain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 5;
            pointer-events: none;
        }

        /* 벨벳 커튼의 묵직한 버건디 레드 + 세로 천 주름(그라데이션 패턴) 스타일 */
        .curtain-left, .curtain-right {
            width: 50%;
            height: 100%;
            background: #7a0010;
            /* 세로로 떨어지는 천 주름 형태를 질감 그라데이션으로 구현 */
            background-image: repeating-linear-gradient(
                90deg,
                rgba(0, 0, 0, 0.4) 0px,
                rgba(0, 0, 0, 0.2) 10px,
                transparent 25px,
                rgba(255, 255, 255, 0.1) 40px,
                rgba(0, 0, 0, 0.4) 50px
            );
            box-shadow: inset -5px 0 20px rgba(0,0,0,0.7), inset 5px 0 20px rgba(0,0,0,0.7);
            /* 천이 자연스럽게 접히며 넘어가도록 transition 속성 지정 */
            transition: transform 1.4s cubic-bezier(0.645, 0.045, 0.355, 1.000), 
                        opacity 1.2s ease,
                        filter 1.2s ease;
            transform-origin: left center;
        }
        
        .curtain-right {
            transform-origin: right center;
        }

        /* [연출] 조명이 켜지면 커튼이 단순히 밀리는 게 아니라 접히면서 스르륵 넘어감 */
        body.light-on .curtain-left {
            transform: scaleX(0) translateX(-100%);
            opacity: 0.3;
            filter: blur(2px);
        }
        body.light-on .curtain-right {
            transform: scaleX(0) translateX(100%);
            opacity: 0.3;
            filter: blur(2px);
        }

        /* ==========================================
           3. 상단 조명 스위치 (흰색 선화 스타일)
           ========================================== */
        .switch-container {
            text-align: center;
            cursor: pointer;
            z-index: 10;
            user-select: none;
            margin-bottom: 50px;
            background: none;
            border: none;
            padding: 0;
        }

        .switch-container svg {
            stroke: #ffffff;
            stroke-width: 1.5;
            fill: none;
            transition: all 0.4s ease;
            filter: drop-shadow(0 0 2px rgba(255,255,255,0.3));
        }

        /* 조명이 켜졌을 때 전구 내부가 흰색 네온 형광으로 환하게 빛남 */
        .switch-container.active svg {
            stroke: #ffffff;
            fill: rgba(255, 255, 255, 0.1);
            filter: drop-shadow(0 0 10px #ffffff) drop-shadow(0 0 25px #ffffff);
        }

        /* ==========================================
           4. 깔끔한 흰색 네온 라인 카테고리 영역
           ========================================== */
        .category-zone {
            opacity: 0;
            transform: translateY(20px);
            width: 90%;
            max-width: 800px;
            text-align: center;
            transition: opacity 1s ease, transform 1s ease;
            z-index: 2;
            visibility: hidden;
        }

        body.light-on .category-zone {
            opacity: 1;
            transform: translateY(0);
            visibility: visible;
        }

        .category-flex {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        /* 상자 없이 아이콘 자체만 노출 */
        .category-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 15px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        /* 기본 선화 형태 */
        .category-icon-btn svg {
            stroke: #777777; /* 평소엔 차분한 회색 선 */
            stroke-width: 1.8;
            fill: none;
            transition: all 0.3s ease;
        }

        /* 마우스를 올리거나 활성화 시 강렬하고 깔끔한 화이트 네온 형광 처리 */
        .category-icon-btn:hover svg, .category-icon-btn.selected svg {
            stroke: #ffffff;
            filter: drop-shadow(0 0 8px #ffffff) drop-shadow(0 0 18px #ffffff);
            transform: scale(1.12);
        }

        /* ==========================================
           5. 하단 위키 스타일 목록화 영역
           ========================================== */
        .character-list-section {
            display: none;
            background: #121212; /* 위키 가독성을 위한 다크 그레이 */
            border: 1px solid #333333;
            padding: 30px;
            border-radius: 4px;
            text-align: left;
            animation: fadeIn 0.4s ease forwards;
        }

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }
        }

        .character-list-section h2 {
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #444444;
            padding-bottom: 8px;
            color: #ffffff;
            font-size: 18px;
        }

        .archive-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .archive-item {
            padding: 12px 8px;
            border-bottom: 1px solid #222222;
        }

        .archive-item:last-child {
            border-bottom: none;
        }

        /* 나무위키처럼 깔끔하고 직관적으로 바로 넘어가는 링크 */
        .item-link {
            color: #3399ff; /* 위키 특유의 블루 링크 컬러감 반영 */
            text-decoration: none;
            font-size: 15px;
            transition: color 0.2s, text-decoration 0.2s;
        }
        
        .item-link:hover {
            color: #66b2ff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

        <div class="curtain-left"></div>

    </div>

            <h2>목록: 야구공 관련 데이터</h2>

                    <a
