<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Curtain Call Archive</title>
    <style>
        /* ==========================================
           1. 전체 레이아웃 & 3D 공간 설정
           ========================================== */
        body {
            margin: 0;
            padding: 0;
            background-color: #0d0d0d;
            font-family: 'Apple SD Gothic Neo', 'Malgun Gothic', sans-serif;
            color: #ffffff;
            overflow-x: hidden;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            position: relative;
            /* 커튼이 입체적으로 회전하며 걷히도록 3D 깊이감 부여 */
            perspective: 1200px; 
        }

        /* ==========================================
           2. 걷혀 넘어가는 입체 무대 커튼 (Curtain) 연출
           ========================================== */
        .curtain-container {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            display: flex;
            z-index: 5;
            pointer-events: none;
        }

        .curtain-left, .curtain-right {
            width: 50%;
            height: 100%;
            background: #800010;
            /* 묵직한 벨벳 주름 천의 명암 처리 */
            background-image: repeating-linear-gradient(
                90deg,
                rgba(0, 0, 0, 0.45) 0px,
                rgba(0, 0, 0, 0.2) 15px,
                transparent 30px,
                rgba(255, 255, 255, 0.08) 45px,
                rgba(0, 0, 0, 0.45) 60px
            );
            box-shadow: inset -10px 0 30px rgba(0,0,0,0.8), inset 10px 0 30px rgba(0,0,0,0.8);
            /* 천이 뒤로 비틀어지며 부드럽게 감기도록 가속도 조정 */
            transition: transform 1.6s cubic-bezier(0.77, 0, 0.175, 1), 
                        opacity 1.4s ease, 
                        box-shadow 1.4s ease;
        }
        
        /* 왼쪽 커튼은 왼쪽 위를 축으로, 오른쪽 커튼은 오른쪽 위를 축으로 회전하며 넘어감 */
        .curtain-left { transform-origin: left top; }
        .curtain-right { transform-origin: right top; }

        /* [핵심 변경] 조명이 켜지면 커튼이 비스듬히 문짝 열리듯 뒤로 돌아가며 걷힙니다 */
        body.light-on .curtain-left {
            transform: rotateY(-85deg) scaleX(0.1);
            opacity: 0.1;
            box-shadow: none;
        }
        body.light-on .curtain-right {
            transform: rotateY(85deg) scaleX(0.1);
            opacity: 0.1;
            box-shadow: none;
        }

        /* ==========================================
           3. 상단 조명 스위치 (최상단 레이어)
           ========================================== */
        .switch-container {
            text-align: center;
            cursor: pointer;
            z-index: 15;
            background: none;
            border: none;
            padding: 10px;
            outline: none;
            position: relative;
            margin-bottom: 50px;
            transition: transform 0.6s ease;
        }

        .switch-container svg {
            stroke: #ffffff;
            stroke-width: 1.5;
            fill: none;
            transition: all 0.4s ease;
            filter: drop-shadow(0 0 3px rgba(255,255,255,0.4));
        }

        /* 불이 켜지면 스위치가 깔끔하게 제자리에서 강한 화이트 형광 발산 */
        .switch-container.active svg {
            stroke: #ffffff;
            fill: rgba(255, 255, 255, 0.15);
            filter: drop-shadow(0 0 12px #ffffff) drop-shadow(0 0 30px #ffffff);
        }

        /* ==========================================
           4. 깔끔한 화이트 네온 라인 카테고리 영역
           ========================================== */
        .category-zone {
            opacity: 0;
            /* 커튼이 넘어간 뒤 무대 뒤편에서 앞으로 전개되는 느낌 부여 */
            transform: translateZ(-150px) translateY(30px);
            width: 90%;
            max-width: 800px;
            text-align: center;
            transition: opacity 1.2s cubic-bezier(0.165, 0.84, 0.44, 1), 
                        transform 1.2s cubic-bezier(0.165, 0.84, 0.44, 1);
            z-index: 2;
            visibility: hidden;
        }

        body.light-on .category-zone {
            opacity: 1;
            transform: translateZ(0) translateY(0);
            visibility: visible;
        }

        .category-flex {
            display: flex;
            justify-content: center;
            gap: 60px;
            flex-wrap: wrap;
            margin-bottom: 50px;
        }

        .category-icon-btn {
            background: none;
            border: none;
            cursor: pointer;
            padding: 15px;
            transition: all 0.3s ease;
            display: flex;
            flex-direction: column;
            align-items: center;
            outline: none;
        }

        .category-icon-btn svg {
            stroke: #555555; /* 미선택 시 더 어둡게 처리하여 대비 극대화 */
            stroke-width: 1.8;
            fill: none;
            transition: all 0.3s ease;
        }

        /* 화이트 네온 튜브 효과 */
        .category-icon-btn:hover svg, .category-icon-btn.selected svg {
            stroke: #ffffff;
            filter: drop-shadow(0 0 8px #ffffff) drop-shadow(0 0 20px #ffffff);
            transform: scale(1.12);
        }

        /* ==========================================
           5. 하단 위키 스타일 목록화 영역
           ========================================== */
        .character-list-section {
            display: none;
            background: #111111;
            border: 1px solid #2a2a2a;
            padding: 30px;
            border-radius: 4px;
            text-align: left;
            animation: fadeInWiki 0.5s ease-out forwards;
        }

        @keyframes fadeInWiki {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .character-list-section h2 {
            margin-top: 0;
            margin-bottom: 15px;
            border-bottom: 1px solid #333333;
            padding-bottom: 8px;
            color: #ffffff;
            font-size: 17px;
            font-weight: 600;
        }

        .archive-list {
            list-style: none;
            padding: 0;
            margin: 0;
        }

        .archive-item {
            padding: 12px 6px;
            border-bottom: 1px solid #1f1f1f;
        }

        .item-link {
            color: #2b8be3; /* 조금 더 정돈된 위키 블루 링크 */
            text-decoration: none;
            font-size: 15px;
            font-weight: 500;
        }
        
        .item-link:hover {
            color: #4da3ff;
            text-decoration: underline;
        }
    </style>
</head>
<body>

    <div class="curtain-container">
        <div class="curtain-left"></div>
        <div class="curtain-right"></div>
    </div>

    <button class="switch-container" id="lampSwitch" onclick="toggleStage()">
        <svg width="60" height="60" viewBox="0 0 60 60">
            <path d="M30,5 L30,15" />
            <path d="M20,28 C20,20 40,20 40,28 C40,34 35,37 35,42 L25,42 C25,37 20,34 20,28 Z" />
            <path d="M26,46 L34,46 M28,50 L32,50" />
        </svg>
    </button>

    <div class="category-zone" id="categoryZone">
        <div class="category-flex">
            
            <button class="category-icon-btn" id="btn-cat1" onclick="showCategory('cat1')">
                <svg width="55" height="55" viewBox="0 0 60 60">
                    <circle cx="30" cy="30" r="25" />
                    <path d="M13,17 C21,23 21,37 13,43" />
                    <path d="M47,17 C39,23 39,37 47,43" />
                </svg>
            </button>

            <button class="category-icon-btn" id="btn-cat2" onclick="showCategory('cat2')">
                <svg width="55" height="55" viewBox="0 0 60 60">
                    <circle cx="30" cy="30" r="13" />
                    <path d="M30,6 L30,12 M30,48 L30,54 M6,30 L12,30 M48,30 L54,30 M14,14 L18,18 M42,42 L46,46 M14,42 L18,38 M42,14 L46,18" />
                </svg>
            </button>

            <button class="category-icon-btn" id="btn-cat3" onclick="showCategory('cat3')">
                <svg width="55" height="55" viewBox="0 0 60 60">
                    <path d="M12,32 C12,16 48,16 48,32 Z" />
                    <path d="M23,32 L23,48 C23,52 37,52 37,48 L37,32" />
                    <line x1="12" y1="32" x2="48" y2="32" />
                </svg>
            </button>

            <button class="category-icon-btn" id="btn-cat4" onclick="showCategory('cat4')">
                <svg width="55" height="55" viewBox="0 0 60 60">
                    <circle cx="30" cy="30" r="25" />
                    <line x1="5" y1="30" x2="55" y2="30" />
                    <circle cx="30" cy="30" r="8" style="fill: #0d0d0d; stroke-width: 1.8;" />
                    <circle cx="30" cy="30" r="3" />
                </svg>
            </button>

        </div>

        <div class="character-list-section" id="list-cat1">
            <h2>목록: 야구공 관련 데이터</h2>
            <ul class="archive-list">
                <li class="archive-item"><a href="characters/chara_base_01.html" class="item-link">■ 캐릭터_이름_넣을_곳(링크).html</a></li>
            </ul>
        </div>

        <div class="character-list-section" id="list-cat2">
            <h2>목록: 태양 관련 데이터</h2>
            <ul class="archive-list">
                <li class="archive-item"><a href="characters/chara_sun_01.html" class="item-link">■ 캐릭터_이름_넣을_곳(링크).html</a></li>
            </ul>
        </div>

        <div class="character-list-section" id="list-cat3">
            <h2>목록: 버섯 관련 데이터</h2>
            <ul class="archive-list">
                <li class="archive-item"><a href="characters/chara_shroom_01.html" class="item-link">■ 캐릭터_이름_넣을_곳(링크).html</a></li>
            </ul>
        </div>

        <div class="character-list-section" id="list-cat4">
            <h2>목록: 몬스터볼 관련 데이터</h2>
            <ul class="archive-list">
                <li class="archive-item"><a href="characters/chara_ball_01.html" class="item-link">■ 캐릭터_이름_넣을_곳(링크).html</a></li>
            </ul>
        </div>

    </div>

    <script>
        function toggleStage() {
            const body = document.body;
            const lampSwitch = document.getElementById('lampSwitch');
            
            if(body.classList.contains('light-on')) {
                body.classList.remove('light-on');
                lampSwitch.classList.remove('active');
                
                // 목록 일괄 닫기
                const allLists = document.querySelectorAll('.character-list-section');
                allLists.forEach(list => list.style.display = 'none');
                const allCards = document.querySelectorAll('.category-icon-btn');
                allCards.forEach(card => card.classList.remove('selected'));
            } else {
                body.classList.add('light-on');
                lampSwitch.classList.add('active');
            }
        }

        function showCategory(categoryId) {
            const allLists = document.querySelectorAll('.character-list-section');
            allLists.forEach(list => list.style.display = 'none');

            const allCards = document.querySelectorAll('.category-icon-btn');
            allCards.forEach(card => card.classList.remove('selected'));

            const targetList = document.getElementById('list-' + categoryId);
            if (targetList) {
                targetList.style.display = 'block';
                document.getElementById('btn-' + categoryId).classList.add('selected');
                targetList.scrollIntoView({ behavior: 'smooth' });
            }
        }
    </script>
</body>
</html>
